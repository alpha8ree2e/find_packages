<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>包裹查找扫码器</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #111827;
      --muted: #687386;
      --line: #d8e0ea;
      --blue: #1463d8;
      --blue-dark: #0f4ca5;
      --green: #0b8f61;
      --green-bg: #ddf7e9;
      --red: #c8342c;
      --red-bg: #ffe8e5;
      --amber: #a46b14;
      --amber-bg: #fff0c6;
      --shadow: 0 12px 30px rgba(17, 24, 39, .08);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
    }

    .app {
      max-width: 820px;
      margin: 0 auto;
      padding: 12px;
    }

    header {
      padding: 8px 2px 12px;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.1;
    }

    .sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }

    .panel, .result, .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 13px;
      margin-bottom: 12px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 800;
    }

    textarea, input {
      width: 100%;
      border: 1px solid #c8d2df;
      border-radius: 8px;
      padding: 12px;
      background: #fff;
      color: var(--text);
      font-size: 17px;
      outline: none;
    }

    textarea {
      min-height: 158px;
      resize: vertical;
      line-height: 1.45;
    }

    textarea:focus, input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(20, 99, 216, .13);
    }

    .hint {
      margin-top: 7px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    button {
      min-height: 46px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 10px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
    }

    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    .primary {
      background: var(--blue);
      color: #fff;
    }

    .primary:active { background: var(--blue-dark); }

    .secondary {
      background: #eef2f7;
      color: #172033;
      border-color: #d5dde8;
    }

    .danger {
      background: #fff0ee;
      color: var(--red);
      border-color: #ffc9c3;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .stat {
      padding: 10px;
      text-align: center;
    }

    .stat strong {
      display: block;
      font-size: 27px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .reader {
      display: none;
      overflow: hidden;
      position: relative;
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #070b14;
      aspect-ratio: 4 / 3;
    }

    #reader {
      width: 100%;
      height: 100%;
      color: #fff;
    }

    #reader video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
    }

    .scan-frame {
      pointer-events: none;
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(72%, 320px);
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      border: 3px solid rgba(255, 255, 255, .9);
      border-radius: 8px;
      box-shadow: 0 0 0 1px rgba(20, 99, 216, .7), 0 0 18px rgba(20, 99, 216, .85);
    }

    .result {
      min-height: 80px;
      margin-bottom: 12px;
      padding: 13px;
      border-left: 8px solid var(--line);
    }

    .result.hit {
      background: var(--green-bg);
      border-left-color: var(--green);
    }

    .result.miss {
      background: var(--red-bg);
      border-left-color: var(--red);
    }

    .result.warn {
      background: var(--amber-bg);
      border-left-color: var(--amber);
    }

    .result-title {
      margin-bottom: 5px;
      font-size: 21px;
      font-weight: 900;
      word-break: break-word;
    }

    .result-detail {
      color: #334155;
      line-height: 1.35;
      word-break: break-word;
    }

    .small-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .list-head strong {
      font-size: 17px;
    }

    .package-list {
      display: grid;
      gap: 6px;
      max-height: 340px;
      overflow: auto;
      padding-right: 2px;
    }

    .package {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: center;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      background: #fff;
    }

    .package.done {
      background: var(--green-bg);
      border-color: #9ddfbe;
    }

    .badge {
      display: inline-grid;
      place-items: center;
      min-width: 28px;
      height: 28px;
      border-radius: 999px;
      background: #e2e8f0;
      color: #334155;
      font-size: 13px;
      font-weight: 900;
    }

    .done .badge {
      background: var(--green);
      color: #fff;
    }

    .code {
      min-width: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 15px;
      word-break: break-all;
    }

    .time {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .remove-btn {
      display: inline-grid;
      place-items: center;
      width: 34px;
      min-width: 34px;
      height: 34px;
      min-height: 34px;
      padding: 0;
      border-color: #ffc9c3;
      border-radius: 8px;
      background: #fff0ee;
      color: var(--red);
      font-size: 20px;
      line-height: 1;
    }

    @media (max-width: 520px) {
      .app { padding: 10px; }
      h1 { font-size: 24px; }
      .buttons { grid-template-columns: 1fr; }
      .stats { gap: 6px; }
      .stat strong { font-size: 24px; }
      button { width: 100%; }
      .remove-btn { width: 34px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>包裹查找扫码器</h1>
      <div class="sub">批量录入单号，逐个扫码核对，刷新页面会保留当前进度。</div>
    </header>

    <section class="panel">
      <label for="targetInput">要找的单号</label>
      <textarea id="targetInput" placeholder="一行一个，或从表格里整列复制进来"></textarea>
      <div class="hint">支持粘贴带文字的内容，会自动提取 8-30 位、包含数字的字母数字单号并去重。</div>
      <div class="buttons">
        <button class="primary" id="loadBtn" type="button">载入清单</button>
        <button class="danger" id="clearAllBtn" type="button">清空全部</button>
      </div>
    </section>

    <section class="stats" aria-label="查找进度">
      <div class="stat"><strong id="totalCount">0</strong><span>清单</span></div>
      <div class="stat"><strong id="foundCount">0</strong><span>已找到</span></div>
      <div class="stat"><strong id="leftCount">0</strong><span>剩余</span></div>
    </section>

    <section class="panel">
      <label for="manualScan">扫码结果 / 手动输入</label>
      <input id="manualScan" autocomplete="off" autocapitalize="characters" placeholder="手动输入后回车，或配合蓝牙扫码枪">
      <div class="buttons">
        <button class="primary" id="checkBtn" type="button">检查这个单号</button>
        <button class="secondary" id="cameraBtn" type="button">打开摄像头扫码</button>
      </div>
      <div class="reader" id="readerWrap">
        <div id="reader"></div>
        <div class="scan-frame"></div>
      </div>
      <div class="small-row">
        <span id="cameraStatus">摄像头：未开启</span>
        <span id="lastScan">最近：无</span>
      </div>
    </section>

    <section class="result" id="resultBox" aria-live="polite">
      <div class="result-title">先载入清单</div>
      <div class="result-detail">粘贴要找的单号后，就可以开始扫描箱子里的包裹。</div>
    </section>

    <section class="panel">
      <div class="list-head">
        <strong>待找清单</strong>
        <button class="secondary" id="exportBtn" type="button">导出记录</button>
      </div>
      <div class="package-list" id="packageList"></div>
      <div class="buttons">
        <button class="secondary" id="resetBtn" type="button">重置进度</button>
        <button class="danger" id="clearFoundBtn" type="button">只清已找到</button>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "package-scanner-state-v1";
    const targetInput = document.getElementById("targetInput");
    const manualScan = document.getElementById("manualScan");
    const loadBtn = document.getElementById("loadBtn");
    const clearAllBtn = document.getElementById("clearAllBtn");
    const checkBtn = document.getElementById("checkBtn");
    const cameraBtn = document.getElementById("cameraBtn");
    const resetBtn = document.getElementById("resetBtn");
    const clearFoundBtn = document.getElementById("clearFoundBtn");
    const exportBtn = document.getElementById("exportBtn");
    const readerWrap = document.getElementById("readerWrap");
    const cameraStatus = document.getElementById("cameraStatus");
    const lastScan = document.getElementById("lastScan");
    const resultBox = document.getElementById("resultBox");
    const packageList = document.getElementById("packageList");
    const totalCount = document.getElementById("totalCount");
    const foundCount = document.getElementById("foundCount");
    const leftCount = document.getElementById("leftCount");

    let targets = [];
    let found = new Map();
    let scanner = null;
    let scanning = false;
    let lastCameraCode = "";
    let lastCameraAt = 0;

    function normalize(value) {
      return String(value || "").trim().toUpperCase();
    }

    function extractCodes(raw) {
      const seen = new Set();
      return (String(raw || "").match(/[a-zA-Z0-9]{8,30}/g) || [])
        .map(normalize)
        .filter(Boolean)
        .filter((value) => /\d/.test(value))
        .filter((value) => {
          if (seen.has(value)) return false;
          seen.add(value);
          return true;
        });
    }

    function parseTargets(raw) {
      return extractCodes(raw);
    }

    function nowTime() {
      return new Date().toLocaleString("zh-CN", { hour12: false });
    }

    function saveState() {
      const data = {
        text: targetInput.value,
        targets,
        found: Array.from(found.entries())
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const data = JSON.parse(raw);
        targetInput.value = data.text || "";
        targets = Array.isArray(data.targets) ? data.targets.map(normalize).filter(Boolean) : parseTargets(targetInput.value);
        found = new Map(Array.isArray(data.found) ? data.found : []);
        found = new Map(Array.from(found.entries()).filter(([code]) => targets.includes(code)));
      } catch (_) {
        targets = [];
        found = new Map();
      }
    }

    function beep(type) {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const freq = type === "hit" ? 880 : type === "warn" ? 520 : 180;
        osc.frequency.setValueAtTime(freq, ctx.currentTime);
        osc.type = type === "miss" ? "sawtooth" : "sine";
        gain.gain.setValueAtTime(0.001, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.28, ctx.currentTime + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.22);
      } catch (_) {}

      if (navigator.vibrate) {
        if (type === "hit") navigator.vibrate(65);
        if (type === "warn") navigator.vibrate([55, 35, 55]);
        if (type === "miss") navigator.vibrate([130, 50, 130]);
      }
    }

    function setResult(type, title, detail) {
      resultBox.className = "result " + type;
      resultBox.querySelector(".result-title").textContent = title;
      resultBox.querySelector(".result-detail").textContent = detail;
    }

    function updateStats() {
      totalCount.textContent = String(targets.length);
      foundCount.textContent = String(found.size);
      leftCount.textContent = String(Math.max(targets.length - found.size, 0));
      exportBtn.disabled = !targets.length;
    }

    function renderList() {
      packageList.innerHTML = "";
      if (!targets.length) {
        packageList.innerHTML = '<div class="hint">还没有载入单号。</div>';
        updateStats();
        return;
      }

      const fragment = document.createDocumentFragment();
      targets.forEach((code, index) => {
        const row = document.createElement("div");
        row.className = "package" + (found.has(code) ? " done" : "");

        const badge = document.createElement("div");
        badge.className = "badge";
        badge.textContent = found.has(code) ? "✓" : String(index + 1);

        const codeEl = document.createElement("div");
        codeEl.className = "code";
        codeEl.textContent = code;

        const time = document.createElement("div");
        time.className = "time";
        time.textContent = found.get(code) || "";

        const removeBtn = document.createElement("button");
        removeBtn.className = "remove-btn";
        removeBtn.type = "button";
        removeBtn.textContent = "×";
        removeBtn.setAttribute("aria-label", `删除 ${code}`);
        removeBtn.addEventListener("click", () => removeTarget(code));

        row.append(badge, codeEl, time, removeBtn);
        fragment.appendChild(row);
      });
      packageList.appendChild(fragment);
      updateStats();
    }

    function removeTarget(code) {
      targets = targets.filter((target) => target !== code);
      found.delete(code);
      targetInput.value = "";
      renderList();
      saveState();
      if (!targets.length) {
        setResult("", "清单已清空", "可以粘贴下一批要找的单号。");
      } else {
        setResult("warn", "已删除单号", `${code} 已从待找清单里移除。`);
      }
    }

    function loadTargets() {
      const incoming = parseTargets(targetInput.value);
      if (!incoming.length) {
        setResult("", "没有识别到单号", "请粘贴或输入要查找的单号。");
        return;
      }

      const existing = new Set(targets);
      const added = incoming.filter((code) => !existing.has(code));
      targets = targets.concat(added);
      found = new Map(Array.from(found.entries()).filter(([code]) => targets.includes(code)));
      targetInput.value = "";
      renderList();
      saveState();

      const skipped = incoming.length - added.length;
      const detail = skipped
        ? `新增 ${added.length} 个，跳过重复 ${skipped} 个；当前清单共 ${targets.length} 个。`
        : `新增 ${added.length} 个；当前清单共 ${targets.length} 个。`;
      setResult("warn", "清单已导入", detail);
      manualScan.focus();
    }

    function checkCode(raw) {
      const candidates = extractCodes(raw);
      const code = candidates.find((value) => targets.includes(value)) || candidates[0] || "";
      if (!code) {
        const rawText = normalize(raw);
        if (!rawText) return;
        lastScan.textContent = "最近：" + rawText.slice(0, 40);
        setResult("warn", "识别到了，但没有标准单号", "二维码内容里没有找到 8-30 位的字母数字单号。");
        beep("warn");
        return;
      }
      lastScan.textContent = "最近：" + code;

      if (!targets.length) {
        setResult("warn", "还没有清单", "请先载入要找的单号。");
        beep("warn");
        return;
      }

      if (!targets.includes(code)) {
        setResult("miss", "不在清单里", `${code} 不是这批要找的包裹。`);
        beep("miss");
        return;
      }

      if (found.has(code)) {
        setResult("warn", "这个已经找到了", `${code} 在 ${found.get(code)} 已经扫过。`);
        beep("warn");
        return;
      }

      found.set(code, nowTime());
      renderList();
      saveState();
      const left = targets.length - found.size;
      if (left === 0) {
        setResult("hit", "全部找齐了", `${code} 已匹配。清单里的 ${targets.length} 个包裹都找到了。`);
      } else {
        setResult("hit", "找到了", `${code} 已匹配，还剩 ${left} 个。`);
      }
      beep("hit");
    }

    async function startCamera() {
      if (scanning) {
        await stopCamera();
        return;
      }

      if (!window.Html5Qrcode) {
        setResult("miss", "扫码库没有加载成功", "请确认手机能联网加载页面资源，或使用蓝牙扫码枪。");
        beep("miss");
        return;
      }

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setResult("miss", "无法调用摄像头", "请用 HTTPS 地址打开这个页面，并允许摄像头权限。");
        beep("miss");
        return;
      }

      try {
        readerWrap.style.display = "block";
        cameraBtn.textContent = "关闭摄像头";
        cameraStatus.textContent = "摄像头：启动中";
        setResult("warn", "正在打开摄像头", "如果弹出权限提示，请允许使用摄像头。");

        scanner = new Html5Qrcode("reader");
        const formats = window.Html5QrcodeSupportedFormats ? [
          Html5QrcodeSupportedFormats.QR_CODE
        ] : undefined;

        await scanner.start(
          { facingMode: "environment" },
          {
            fps: 12,
            qrbox: (width, height) => {
              const edge = Math.floor(Math.min(width, height) * 0.86);
              return { width: edge, height: edge };
            },
            formatsToSupport: formats
          },
          (decodedText) => {
            const code = normalize(decodedText);
            const now = Date.now();
            if (code && (code !== lastCameraCode || now - lastCameraAt > 1600)) {
              lastCameraCode = code;
              lastCameraAt = now;
              lastScan.textContent = "最近识别：" + code.slice(0, 40);
              checkCode(decodedText);
            }
          }
        );

        scanning = true;
        cameraStatus.textContent = "摄像头：扫描中";
        setResult("warn", "摄像头已开启", "把二维码放进画面中间的方框里。");
      } catch (_) {
        await stopCamera();
        setResult("miss", "无法打开摄像头", "请确认页面是 HTTPS，并在浏览器里允许摄像头权限。");
        beep("miss");
      }
    }

    async function stopCamera() {
      scanning = false;
      if (scanner) {
        try {
          await scanner.stop();
          await scanner.clear();
        } catch (_) {}
      }
      scanner = null;
      readerWrap.style.display = "none";
      cameraBtn.textContent = "打开摄像头扫码";
      cameraStatus.textContent = "摄像头：未开启";
    }

    function exportCsv() {
      if (!targets.length) return;
      const rows = [["waybill", "status", "found_at"]];
      targets.forEach((code) => {
        rows.push([code, found.has(code) ? "found" : "missing", found.get(code) || ""]);
      });
      const csv = rows
        .map((row) => row.map((cell) => `"${String(cell).replaceAll('"', '""')}"`).join(","))
        .join("\n");
      const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `package-scan-${new Date().toISOString().slice(0, 10)}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    loadBtn.addEventListener("click", loadTargets);
    clearAllBtn.addEventListener("click", async () => {
      await stopCamera();
      targetInput.value = "";
      targets = [];
      found = new Map();
      localStorage.removeItem(STORAGE_KEY);
      renderList();
      setResult("", "已清空", "可以粘贴下一批要找的单号。");
    });
    checkBtn.addEventListener("click", () => {
      checkCode(manualScan.value);
      manualScan.value = "";
      manualScan.focus();
    });
    cameraBtn.addEventListener("click", startCamera);
    resetBtn.addEventListener("click", () => {
      found = new Map();
      renderList();
      saveState();
      setResult("warn", "进度已重置", "清单还在，可以重新扫描。");
      manualScan.focus();
    });
    clearFoundBtn.addEventListener("click", () => {
      found = new Map();
      renderList();
      saveState();
      setResult("warn", "已清除找到记录", "单号清单已保留。");
    });
    exportBtn.addEventListener("click", exportCsv);
    targetInput.addEventListener("input", () => {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        text: targetInput.value,
        targets,
        found: Array.from(found.entries())
      }));
    });
    manualScan.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        checkBtn.click();
      }
    });

    loadState();
    renderList();
    if (targets.length) {
      setResult("warn", "已恢复上次进度", `清单 ${targets.length} 个，已找到 ${found.size} 个。`);
    }
  </script>
</body>
</html>
