<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>包裹扫码核验</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
      :root {
        --bg: #f5f5f7;
        --surface: #fff;
        --ink: #000;
        --surface-dark: #1d1d1f;
        --surface-soft: #fafafc;
        --border: rgba(0, 0, 0, 0.08);
        --accent: #0071e3;
        --link: #0066cc;
        --link-dark: #2997ff;
        --text: #1d1d1f;
        --muted: rgba(0, 0, 0, 0.56);
        --quiet: rgba(0, 0, 0, 0.42);
        --radius: 12px;
        --pill: 980px;
        --shadow: rgba(0, 0, 0, 0.22) 3px 5px 30px 0;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family:
          "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        max-width: 600px;
        margin: 0 auto;
        letter-spacing: -0.224px;
      }

      .stats-bar {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        padding: 12px 14px 8px;
        background: var(--bg);
        flex-shrink: 0;
      }
      .stat {
        background: var(--surface);
        padding: 11px 8px;
        text-align: center;
        border-radius: 8px;
      }
      .stat-num {
        font-family:
          "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-size: 22px;
        font-weight: 600;
        line-height: 1.07;
        color: var(--text);
      }
      .stat-num.total,
      .stat-num.found,
      .stat-num.miss {
        color: var(--text);
      }
      .stat-label {
        font-size: 10px;
        color: var(--quiet);
        margin-top: 4px;
        letter-spacing: -0.08px;
      }

      .tabs {
        display: flex;
        gap: 8px;
        padding: 6px 14px 12px;
        background: var(--bg);
        flex-shrink: 0;
      }
      .tab {
        flex: 1;
        padding: 9px 8px;
        text-align: center;
        font-size: 14px;
        font-weight: 400;
        letter-spacing: -0.224px;
        color: var(--muted);
        cursor: pointer;
        border: 1px solid transparent;
        border-radius: var(--pill);
        transition:
          background 0.2s,
          color 0.2s;
        user-select: none;
        background: transparent;
      }
      .tab.active {
        color: #fff;
        background: var(--accent);
      }
      .panel {
        display: none;
        flex: 1;
        flex-direction: column;
        overflow: hidden;
      }
      .panel.active {
        display: flex;
      }

      /* IMPORT */
      .import-panel {
        flex: 1;
        overflow-y: auto;
        padding: 8px 14px 18px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .field-label {
        font-size: 12px;
        color: var(--quiet);
        letter-spacing: -0.12px;
        margin: 0 0 6px 2px;
        display: block;
      }
      textarea {
        width: 100%;
        min-height: 142px;
        background: var(--surface);
        border: 0;
        border-radius: 12px;
        color: var(--text);
        font-family: inherit;
        font-size: 17px;
        padding: 14px 15px;
        resize: vertical;
        outline: none;
        line-height: 1.47;
        letter-spacing: -0.374px;
        transition: box-shadow 0.2s;
      }
      textarea:focus {
        box-shadow: 0 0 0 2px var(--accent);
      }
      textarea::placeholder {
        color: var(--quiet);
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        min-height: 44px;
        padding: 8px 16px;
        border-radius: var(--pill);
        font-family: inherit;
        font-size: 17px;
        font-weight: 400;
        cursor: pointer;
        border: 1px solid transparent;
        transition:
          opacity 0.15s,
          transform 0.1s,
          background 0.15s;
        letter-spacing: 0;
        user-select: none;
      }
      .btn:active {
        transform: scale(0.97);
      }
      .btn-primary {
        background: var(--accent);
        color: #fff;
        width: 100%;
      }
      .btn-export {
        background: var(--surface-dark);
        color: #fff;
        width: 100%;
      }
      .btn-secondary {
        background: #f5f7fa;
        color: var(--text);
        border: 1px solid var(--border);
        width: 100%;
      }
      .btn-danger {
        background: transparent;
        color: var(--text);
        border: 1px solid rgba(0, 0, 0, 0.28);
        width: 100%;
      }
      .order-list {
        background: var(--surface);
        border: 0;
        border-radius: 12px;
        overflow: hidden;
        max-height: 260px;
        overflow-y: auto;
      }
      .order-item {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        align-items: center;
        gap: 8px;
        padding: 11px 10px 11px 14px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        font-size: 14px;
      }
      .order-item:last-child {
        border-bottom: none;
      }
      .order-code {
        word-break: break-all;
        font-size: 14px;
        min-width: 0;
        letter-spacing: -0.224px;
      }
      .badge {
        font-size: 12px;
        padding: 3px 9px;
        border-radius: var(--pill);
        font-weight: 600;
        letter-spacing: -0.12px;
        flex-shrink: 0;
        margin-left: 8px;
      }
      .badge-pending {
        background: var(--surface-soft);
        color: var(--quiet);
      }
      .badge-found {
        background: rgba(0, 113, 227, 0.1);
        color: var(--link);
      }
      .remove-order {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        border: 0;
        background: rgba(210, 210, 215, 0.64);
        color: var(--quiet);
        font-size: 18px;
        line-height: 1;
        cursor: pointer;
        flex-shrink: 0;
      }

      /* SCAN panel - 正常布局，摄像头按钮居中 */
      .scan-idle {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: 34px 20px;
        background: #fff;
        text-align: center;
      }
      .btn-scan-big {
        background: var(--accent);
        color: #fff;
        font-size: 17px;
        padding: 12px 26px;
        border-radius: var(--pill);
        border: none;
        font-family: inherit;
        font-weight: 400;
        cursor: pointer;
        letter-spacing: 0;
        min-width: 168px;
      }
      .scan-symbol {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: #000;
        color: #fff;
        font-size: 22px;
        font-weight: 600;
      }
      .mode-control {
        display: flex;
        gap: 8px;
        width: 100%;
        max-width: 280px;
        padding: 4px;
        background: var(--bg);
        border-radius: var(--pill);
      }
      .mode-btn {
        flex: 1;
        border: 0;
        border-radius: var(--pill);
        background: transparent;
        color: var(--muted);
        font: inherit;
        font-size: 14px;
        padding: 8px 10px;
        cursor: pointer;
      }
      .mode-btn.active {
        background: var(--accent);
        color: #fff;
      }

      /* INPUT panel */
      .input-panel {
        flex: 1;
        overflow-y: auto;
        padding: 18px 14px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .manual-card {
        background: var(--surface);
        border-radius: 12px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .manual-input {
        width: 100%;
        border: 0;
        background: var(--bg);
        border-radius: 11px;
        color: var(--text);
        font-family: inherit;
        font-size: 17px;
        line-height: 1.47;
        letter-spacing: -0.374px;
        padding: 13px 14px;
        outline: none;
      }
      .manual-input:focus {
        box-shadow: 0 0 0 2px var(--accent);
      }
      .manual-result {
        background: var(--bg);
        border-radius: 12px;
        overflow: hidden;
      }
      .manual-choice {
        display: block;
        width: 100%;
        border: 0;
        background: transparent;
        color: var(--text);
        text-align: left;
        font: inherit;
        font-size: 15px;
        letter-spacing: -0.224px;
        padding: 13px 14px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        cursor: pointer;
        word-break: break-all;
      }
      .manual-choice:last-child {
        border-bottom: 0;
      }
      .manual-choice strong {
        color: var(--link);
      }
      .manual-hint {
        color: var(--quiet);
        font-size: 12px;
        line-height: 1.35;
        letter-spacing: -0.12px;
      }

      /* 全屏扫描层 */
      .fullscreen-scan {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 200;
        background: #000;
        flex-direction: column;
      }
      .fullscreen-scan.active {
        display: flex;
      }
      #reader-fs {
        flex: 1;
        width: 100%;
        overflow: hidden;
      }
      #reader-fs video {
        width: 100% !important;
        height: 100% !important;
        object-fit: cover !important;
        display: block !important;
      }
      .scan-guide {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        border: 3px solid rgba(255, 255, 255, 0.92);
        border-radius: 10px;
        box-shadow:
          0 0 0 9999px rgba(0, 0, 0, 0.18),
          0 0 0 1px rgba(0, 113, 227, 0.9),
          0 0 24px rgba(0, 113, 227, 0.7);
        pointer-events: none;
        z-index: 8;
      }
      .scan-guide.qr {
        width: min(74vw, 340px);
        height: min(74vw, 340px);
      }
      .scan-guide.barcode {
        width: min(88vw, 460px);
        height: 26vw;
        max-height: 150px;
        min-height: 92px;
      }

      /* 全屏顶部工具栏 */
      .fs-topbar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: saturate(180%) blur(20px);
        -webkit-backdrop-filter: saturate(180%) blur(20px);
        z-index: 10;
      }
      .fs-title {
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: -0.224px;
      }
      .fs-stats {
        display: flex;
        gap: 8px;
      }
      .fs-stat {
        font-size: 12px;
        font-weight: 600;
        padding: 4px 9px;
        border-radius: var(--pill);
        background: rgba(255, 255, 255, 0.14);
        color: #fff;
      }
      .btn-fs-stop {
        background: rgba(210, 210, 215, 0.64);
        border: 0;
        color: rgba(0, 0, 0, 0.8);
        font-size: 12px;
        padding: 6px 13px;
        border-radius: var(--pill);
        font-family: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      .btn-fs-export {
        background: var(--accent);
        border: none;
        color: #fff;
        font-size: 12px;
        padding: 6px 13px;
        border-radius: var(--pill);
        font-family: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      /* 底部手动输入栏 */

      /* 扫描结果 Popup */
      .scan-popup {
        position: absolute;
        left: 50%;
        bottom: 110px;
        transform: translateX(-50%) translateY(20px);
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.2s,
          transform 0.2s;
        z-index: 20;
        min-width: 260px;
        max-width: 88vw;
      }
      .scan-popup.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      .popup-inner {
        border-radius: 12px;
        padding: 14px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow: var(--shadow);
      }
      .popup-inner.found {
        background: rgba(0, 113, 227, 0.94);
      }
      .popup-inner.miss {
        background: rgba(29, 29, 31, 0.94);
      }
      .popup-icon {
        font-size: 28px;
        line-height: 1;
        flex-shrink: 0;
      }
      .popup-code {
        font-size: 15px;
        font-weight: 700;
        color: #fff;
        word-break: break-all;
      }
      .popup-msg {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.8);
        margin-top: 3px;
      }

      /* 扫描记录（非全屏时显示） */
      .scan-log {
        flex: 1;
        overflow-y: auto;
        padding: 10px 16px 16px;
        min-height: 0;
        background: var(--bg);
      }
      .log-title {
        font-size: 12px;
        color: var(--quiet);
        letter-spacing: -0.12px;
        padding: 8px 0 7px;
        margin-bottom: 4px;
      }
      .log-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 0;
        border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        font-size: 12px;
      }
      .log-icon {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: rgba(0, 113, 227, 0.1);
        color: var(--link);
        font-size: 12px;
        flex-shrink: 0;
      }
      .log-icon.miss {
        background: rgba(0, 0, 0, 0.08);
        color: var(--text);
      }
      .log-code {
        flex: 1;
        word-break: break-all;
      }
      .log-time {
        color: var(--muted);
        font-size: 11px;
        flex-shrink: 0;
      }
      .empty-hint {
        text-align: center;
        color: var(--muted);
        font-size: 12px;
        padding: 24px 0;
      }

      /* EXPORT MODAL */
      .modal-bg {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        z-index: 300;
        align-items: flex-end;
        justify-content: center;
      }
      .modal-bg.open {
        display: flex;
      }
      .modal {
        background: var(--surface);
        width: 100%;
        max-width: 600px;
        border-radius: 12px 12px 0 0;
        padding: 20px 20px 36px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        animation: slideUp 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        max-height: 90vh;
        overflow-y: auto;
      }
      @keyframes slideUp {
        from {
          transform: translateY(100%);
        }
        to {
          transform: translateY(0);
        }
      }
      .modal-title {
        font-family:
          "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-size: 21px;
        font-weight: 700;
        line-height: 1.19;
        letter-spacing: 0.231px;
      }
      .modal-section {
        font-size: 12px;
        color: var(--quiet);
        letter-spacing: -0.12px;
        margin-bottom: 4px;
      }
      .export-box {
        background: var(--bg);
        border: 0;
        border-radius: 8px;
        padding: 12px;
        font-size: 12px;
        max-height: 110px;
        overflow-y: auto;
        line-height: 2;
        white-space: pre-wrap;
        word-break: break-all;
        color: var(--text);
      }
      .export-box span {
        display: block;
      }
      .export-box .hit {
        color: var(--link);
      }
      .export-box .nope {
        color: var(--text);
      }
      .modal-btns {
        display: flex;
        gap: 8px;
        margin-top: 4px;
        flex-wrap: wrap;
      }
      .btn-copy {
        flex: 1;
        background: var(--accent);
        color: #fff;
        min-width: 80px;
      }
      .btn-csv {
        flex: 1;
        background: #f5f7fa;
        color: var(--text);
        border: 1px solid var(--border);
        min-width: 80px;
      }
      .btn-close-m {
        flex: 1;
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border);
        min-width: 80px;
      }

      #toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(80px);
        background: var(--surface-dark);
        color: #fff;
        border: 0;
        padding: 10px 20px;
        border-radius: var(--pill);
        font-size: 14px;
        z-index: 999;
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        white-space: nowrap;
        box-shadow: var(--shadow);
      }
      #toast.show {
        transform: translateX(-50%) translateY(0);
      }
    </style>
  </head>
  <body>
    <div class="stats-bar">
      <div class="stat">
        <div class="stat-num total" id="s-total">0</div>
        <div class="stat-label">需要找</div>
      </div>
      <div class="stat">
        <div class="stat-num found" id="s-found">0</div>
        <div class="stat-label">已找到</div>
      </div>
      <div class="stat">
        <div class="stat-num pending" id="s-pending">0</div>
        <div class="stat-label">待查找</div>
      </div>
      <div class="stat">
        <div class="stat-num miss" id="s-miss">0</div>
        <div class="stat-label">范围外</div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="import">导入单号</div>
      <div class="tab" data-tab="scan">扫码核验</div>
      <div class="tab" data-tab="input">输入核验</div>
    </div>

    <!-- IMPORT -->
    <div class="panel active" id="panel-import">
      <div class="import-panel">
        <div>
          <label class="field-label">粘贴单号或带文字的清单</label>
          <textarea
            id="raw-input"
            placeholder="支持脏文本，会自动提取 8-30 位、包含数字的单号&#10;例如：&#10;amanda:&#10;GFUS01046086033216&#10;CR010775297525"
          ></textarea>
        </div>
        <button class="btn btn-primary" onclick="importOrders()">
          导入单号
        </button>
        <button class="btn btn-export" onclick="openExport()">导出报告</button>
        <button class="btn btn-secondary" onclick="resetProgress()">
          ↺ 重置进度
        </button>
        <button class="btn btn-danger" onclick="clearAll()">清空全部</button>
        <div id="order-list-wrap" style="display: none">
          <label class="field-label" id="list-label">单号列表</label>
          <div class="order-list" id="order-list"></div>
        </div>
      </div>
    </div>

    <!-- SCAN -->
    <div class="panel" id="panel-scan">
      <div class="scan-idle">
        <div class="scan-symbol">⌗</div>
        <div style="font-size: 16px; font-weight: 700; color: var(--text)">
          扫码核验
        </div>
        <div style="font-size: 13px; color: var(--muted); text-align: center">
          点击开始，摄像头全屏展开<br />扫到结果后自动弹出提示
        </div>
        <div class="mode-control" aria-label="扫码模式">
          <button
            class="mode-btn active"
            id="qrModeBtn"
            type="button"
            onclick="setScanMode('qr')"
          >
            二维码
          </button>
          <button
            class="mode-btn"
            id="barcodeModeBtn"
            type="button"
            onclick="setScanMode('barcode')"
          >
            条形码
          </button>
        </div>
        <button class="btn-scan-big" onclick="startScan()">开始扫描</button>
        <button
          class="btn btn-primary btn-exp-sm"
          style="
            font-size: 14px;
            min-height: 38px;
            padding: 8px 18px;
            width: auto;
          "
          onclick="openExport()"
        >
          导出报告
        </button>
      </div>
      <div class="scan-log" style="border-top: 1px solid var(--border)">
        <div class="log-title">扫描记录</div>
        <div id="log-body"><div class="empty-hint">暂无扫描记录</div></div>
      </div>
    </div>

    <!-- INPUT -->
    <div class="panel" id="panel-input">
      <div class="input-panel">
        <div class="manual-card">
          <label class="field-label" for="manual-exact-input"
            >扫描枪 / 完整单号精准核验</label
          >
          <input
            class="manual-input"
            id="manual-exact-input"
            autocomplete="off"
            autocapitalize="characters"
            placeholder="扫描枪输入完整单号，或手动输入后回车"
          />
          <button class="btn btn-primary" onclick="checkExactInput()">
            核验这个单号
          </button>
          <div class="manual-hint">
            这里用于扫描枪或完整单号。只有完全匹配清单里的单号，才会标记为已找到。
          </div>
        </div>
        <div class="manual-card">
          <label class="field-label" for="manual-search-input"
            >看不清时，输入几位查找</label
          >
          <input
            class="manual-input"
            id="manual-search-input"
            autocomplete="off"
            autocapitalize="characters"
            placeholder="输入至少 3 位，例如 74211"
          />
          <div class="manual-result" id="manual-search-results">
            <div class="empty-hint">
              输入几位后，会显示待查找清单里的候选单号。
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 全屏扫描层 -->
    <div class="fullscreen-scan" id="fs-scan">
      <div id="reader-fs"></div>
      <div class="scan-guide qr" id="scan-guide"></div>

      <div class="fs-topbar">
        <div class="fs-title">扫码核验</div>
        <div class="fs-stats">
          <span class="fs-stat" id="fs-found">✓ 0</span>
          <span class="fs-stat" id="fs-miss">✗ 0</span>
        </div>
        <div style="display: flex; gap: 8px">
          <button class="btn-fs-export" onclick="openExport()">导出</button>
          <button class="btn-fs-stop" onclick="stopScan()">停止</button>
        </div>
      </div>

      <!-- 结果 Popup -->
      <div class="scan-popup" id="scan-popup">
        <div class="popup-inner" id="popup-inner">
          <div class="popup-icon" id="popup-icon">✓</div>
          <div>
            <div class="popup-code" id="popup-code"></div>
            <div class="popup-msg" id="popup-msg"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- EXPORT MODAL -->
    <div class="modal-bg" id="modal-bg" onclick="closeExportIfBg(event)">
      <div class="modal">
        <div class="modal-title">核验报告</div>
        <div>
          <div class="modal-section">
            在列表中已扫到 (<span id="exp-found-count">0</span> 个)
          </div>
          <div class="export-box" id="exp-found">
            <span style="color: var(--muted)">（无）</span>
          </div>
        </div>
        <div>
          <div class="modal-section">
            列表中未扫到 (<span id="exp-pending-count">0</span> 个)
          </div>
          <div class="export-box" id="exp-pending">
            <span style="color: var(--muted)">（无）</span>
          </div>
        </div>
        <div>
          <div class="modal-section">
            扫到但不在列表 (<span id="exp-miss-count">0</span> 个)
          </div>
          <div class="export-box" id="exp-miss">
            <span style="color: var(--muted)">（无）</span>
          </div>
        </div>
        <div class="modal-btns">
          <button class="btn btn-copy" onclick="copyReport()">复制文本</button>
          <button class="btn btn-csv" onclick="downloadCSV()">下载 CSV</button>
          <button class="btn btn-close-m" onclick="closeExport()">关闭</button>
        </div>
      </div>
    </div>

    <div id="toast"></div>

    <script>
      // ─── State ───────────────────────────────────
      const orders = new Map(); // code → 'pending'|'found'
      const missLog = new Set();
      const STORAGE_KEY = "package-scanner-v3";

      let html5QrCode = null;
      let scanActive = false;
      let scanMode = "qr";

      const DEBOUNCE_MS = 2000;
      const lastSeen = new Map();
      let resetTimer = null;

      function normalize(value) {
        return String(value || "")
          .trim()
          .toUpperCase();
      }

      function extractCodes(raw) {
        const seen = new Set();
        return (String(raw || "").match(/[a-zA-Z0-9]{8,30}/g) || [])
          .map(normalize)
          .filter(Boolean)
          .filter((value) => /\d/.test(value))
          .filter((value) => {
            if (seen.has(value)) return false;
            seen.add(value);
            return true;
          });
      }

      function saveState() {
        try {
          localStorage.setItem(
            STORAGE_KEY,
            JSON.stringify({
              orders: [...orders.entries()],
              missLog: [...missLog],
            }),
          );
        } catch (e) {}
      }

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return;
          const data = JSON.parse(raw);
          if (Array.isArray(data.orders)) {
            data.orders.forEach(([code, status]) => {
              const clean = normalize(code);
              if (clean)
                orders.set(clean, status === "found" ? "found" : "pending");
            });
          }
          if (Array.isArray(data.missLog)) {
            data.missLog
              .map(normalize)
              .filter(Boolean)
              .forEach((code) => missLog.add(code));
          }
        } catch (e) {}
      }

      // ─── Tabs ────────────────────────────────────
      document.querySelectorAll(".tab").forEach((t) => {
        t.addEventListener("click", () => {
          document
            .querySelectorAll(".tab,.panel")
            .forEach((e) => e.classList.remove("active"));
          t.classList.add("active");
          document
            .getElementById("panel-" + t.dataset.tab)
            .classList.add("active");
        });
      });

      // ─── Import ──────────────────────────────────
      function importOrders() {
        const input = document.getElementById("raw-input");
        const raw = input.value.trim();
        if (!raw) {
          toast("请先输入单号");
          return;
        }
        const codes = extractCodes(raw);
        if (!codes.length) {
          toast("未识别到标准单号");
          return;
        }
        let added = 0;
        codes.forEach((code) => {
          if (!orders.has(code)) {
            orders.set(code, "pending");
            added++;
          }
        });
        renderOrderList();
        updateStats();
        saveState();
        const skipped = codes.length - added;
        toast(
          "新增 " +
            added +
            " 个，跳过重复 " +
            skipped +
            " 个（共 " +
            orders.size +
            " 个）",
        );
        input.value = "";
      }

      function clearAll() {
        if (!orders.size && !missLog.size) {
          toast("列表已为空");
          return;
        }
        if (!confirm("确认清空全部单号和扫描记录？")) return;
        orders.clear();
        missLog.clear();
        lastSeen.clear();
        document.getElementById("log-body").innerHTML =
          '<div class="empty-hint">暂无扫描记录</div>';
        renderOrderList();
        updateStats();
        updateFsStats();
        hidePopup();
        saveState();
        toast("已清空");
      }

      function resetProgress() {
        if (!orders.size && !missLog.size) {
          toast("没有可重置的进度");
          return;
        }
        orders.forEach((_, code) => orders.set(code, "pending"));
        missLog.clear();
        lastSeen.clear();
        document.getElementById("log-body").innerHTML =
          '<div class="empty-hint">暂无扫描记录</div>';
        renderOrderList();
        updateStats();
        updateFsStats();
        hidePopup();
        saveState();
        toast("已重置扫描进度，单号列表已保留");
      }

      function renderOrderList() {
        const wrap = document.getElementById("order-list-wrap");
        if (!orders.size) {
          wrap.style.display = "none";
          return;
        }
        wrap.style.display = "";
        document.getElementById("list-label").textContent =
          "单号列表（" + orders.size + " 个）";
        const list = document.getElementById("order-list");
        list.innerHTML = "";
        [...orders.entries()].forEach(([code, st]) => {
          const item = document.createElement("div");
          item.className = "order-item";
          const codeEl = document.createElement("span");
          codeEl.className = "order-code";
          codeEl.textContent = code;
          const badge = document.createElement("span");
          badge.className = "badge badge-" + st;
          badge.textContent = st === "found" ? "✓ 已扫" : "待扫";
          const remove = document.createElement("button");
          remove.className = "remove-order";
          remove.type = "button";
          remove.textContent = "×";
          remove.setAttribute("aria-label", "删除 " + code);
          remove.addEventListener("click", () => removeOrder(code));
          item.append(codeEl, badge, remove);
          list.appendChild(item);
        });
      }

      function removeOrder(code) {
        orders.delete(code);
        lastSeen.delete(code);
        renderOrderList();
        updateStats();
        updateFsStats();
        saveState();
        toast("已删除 " + code);
      }

      function setScanMode(mode) {
        scanMode = mode === "barcode" ? "barcode" : "qr";
        document
          .getElementById("qrModeBtn")
          .classList.toggle("active", scanMode === "qr");
        document
          .getElementById("barcodeModeBtn")
          .classList.toggle("active", scanMode === "barcode");
        const guide = document.getElementById("scan-guide");
        if (guide) guide.className = "scan-guide " + scanMode;
      }

      function getScanConfig() {
        const isBarcode = scanMode === "barcode";
        return {
          fps: 20,
          qrbox: (w, h) => {
            if (isBarcode) {
              return {
                width: Math.round(w * 0.88),
                height: Math.max(92, Math.round(h * 0.18)),
              };
            }
            const edge = Math.round(Math.min(w, h) * 0.74);
            return { width: edge, height: edge };
          },
          aspectRatio: window.innerHeight / window.innerWidth,
          rememberLastUsedCamera: true,
          formatsToSupport: isBarcode
            ? [Html5QrcodeSupportedFormats.CODE_128]
            : [Html5QrcodeSupportedFormats.QR_CODE],
          experimentalFeatures: {
            useBarCodeDetectorIfSupported: true,
          },
        };
      }

      // ─── Scanner (html5-qrcode) ──────────────────
      async function startScan() {
        if (orders.size === 0) {
          toast("请先在「导入单号」中添加单号");
          return;
        }
        if (scanActive) return;

        if (html5QrCode) {
          try {
            await html5QrCode.stop();
          } catch (e) {}
          html5QrCode = null;
        }

        // 展开全屏层
        document.getElementById("fs-scan").classList.add("active");
        document.getElementById("scan-guide").className =
          "scan-guide " + scanMode;

        html5QrCode = new Html5Qrcode("reader-fs");
        const config = getScanConfig();

        try {
          await html5QrCode.start(
            { facingMode: "environment" },
            config,
            (decodedText) => {
              const candidates = extractCodes(decodedText);
              const code =
                candidates.find((c) => orders.has(c)) ||
                candidates[0] ||
                normalize(decodedText);
              if (!code) return;
              const now = Date.now();
              if (lastSeen.has(code) && now - lastSeen.get(code) < DEBOUNCE_MS)
                return;
              lastSeen.set(code, now);
              processCode(decodedText);
            },
            () => {},
          );
          scanActive = true;
        } catch (e) {
          console.error(e);
          document.getElementById("fs-scan").classList.remove("active");
          html5QrCode = null;
          let msg = e.message || String(e);
          if (/permission/i.test(msg))
            msg = "未获得摄像头权限，请在浏览器设置中允许";
          toast("摄像头启动失败：" + msg);
        }
      }

      async function stopScan() {
        if (html5QrCode) {
          try {
            await html5QrCode.stop();
          } catch (e) {}
          try {
            html5QrCode.clear();
          } catch (e) {}
          html5QrCode = null;
        }
        scanActive = false;
        document.getElementById("fs-scan").classList.remove("active");
        hidePopup();
      }

      // ─── Process Code ────────────────────────────
      function processCode(code) {
        const candidates = extractCodes(code);
        const cleanCode =
          candidates.find((c) => orders.has(c)) ||
          candidates[0] ||
          normalize(code);
        if (!cleanCode) return;
        const found = orders.has(cleanCode);
        if (found) {
          orders.set(cleanCode, "found");
          showPopup(true, cleanCode, "在列表中 ✓");
          addLog("✓", cleanCode, true);
          vibrate([80, 40, 80]);
          renderOrderList();
        } else {
          missLog.add(cleanCode);
          showPopup(false, cleanCode, "不在列表中 ✗");
          addLog("×", cleanCode, false);
          vibrate([300]);
        }
        updateStats();
        updateFsStats();
        saveState();
        if (resetTimer) clearTimeout(resetTimer);
        resetTimer = setTimeout(hidePopup, 2000);
      }

      function processExactCode(raw) {
        const code = normalize(raw);
        if (!code) return false;
        lastSeen.delete(code);
        const found = orders.has(code);
        if (found) {
          orders.set(code, "found");
          showPopup(true, code, "精准匹配 ✓");
          addLog("✓", code, true);
          vibrate([80, 40, 80]);
          renderOrderList();
        } else {
          missLog.add(code);
          showPopup(false, code, "不在列表中 ✗");
          addLog("×", code, false);
          vibrate([300]);
        }
        updateStats();
        updateFsStats();
        saveState();
        if (resetTimer) clearTimeout(resetTimer);
        resetTimer = setTimeout(hidePopup, 2000);
        return found;
      }

      function checkExactInput() {
        const inp = document.getElementById("manual-exact-input");
        const code = inp.value.trim();
        if (!code) return;
        processExactCode(code);
        inp.value = "";
        inp.focus();
      }

      function renderManualMatches(query) {
        const box = document.getElementById("manual-search-results");
        const q = normalize(query);
        if (q.length < 3) {
          box.innerHTML =
            '<div class="empty-hint">输入至少 3 位后显示候选单号。</div>';
          return;
        }
        const matches = [...orders.entries()]
          .filter(([, status]) => status !== "found")
          .map(([code]) => code)
          .filter((code) => code.includes(q))
          .slice(0, 20);
        if (!matches.length) {
          box.innerHTML =
            '<div class="empty-hint">没有匹配到待查找单号。</div>';
          return;
        }
        box.innerHTML = "";
        matches.forEach((code) => {
          const btn = document.createElement("button");
          btn.className = "manual-choice";
          btn.type = "button";
          btn.innerHTML = esc(code).replace(
            new RegExp(escRegExp(q), "g"),
            "<strong>" + esc(q) + "</strong>",
          );
          btn.addEventListener("click", () => {
            processExactCode(code);
            document.getElementById("manual-search-input").value = "";
            renderManualMatches("");
          });
          box.appendChild(btn);
        });
      }

      // ─── Popup ───────────────────────────────────
      function showPopup(found, code, msg) {
        const popup = document.getElementById("scan-popup");
        const inner = document.getElementById("popup-inner");
        document.getElementById("popup-icon").textContent = found ? "✓" : "×";
        document.getElementById("popup-code").textContent = code;
        document.getElementById("popup-msg").textContent = msg;
        inner.className = "popup-inner " + (found ? "found" : "miss");
        popup.classList.add("show");
      }
      function hidePopup() {
        document.getElementById("scan-popup").classList.remove("show");
      }
      function updateFsStats() {
        let found = 0;
        orders.forEach((v) => {
          if (v === "found") found++;
        });
        document.getElementById("fs-found").textContent = "✓ " + found;
        document.getElementById("fs-miss").textContent = "✗ " + missLog.size;
      }

      function addLog(icon, code, found) {
        const body = document.getElementById("log-body");
        if (body.querySelector(".empty-hint")) body.innerHTML = "";
        const now = new Date();
        const t = [now.getHours(), now.getMinutes(), now.getSeconds()]
          .map((n) => String(n).padStart(2, "0"))
          .join(":");
        const item = document.createElement("div");
        item.className = "log-item";
        item.innerHTML =
          '<span class="log-icon' +
          (found ? "" : " miss") +
          '">' +
          icon +
          "</span>" +
          '<span class="log-code" style="color:' +
          (found ? "var(--link)" : "var(--text)") +
          '">' +
          esc(code) +
          "</span>" +
          '<span class="log-time">' +
          t +
          "</span>";
        body.insertBefore(item, body.firstChild);
      }

      function updateStats() {
        let found = 0;
        orders.forEach((v) => {
          if (v === "found") found++;
        });
        const pending = Math.max(orders.size - found, 0);
        document.getElementById("s-total").textContent = orders.size;
        document.getElementById("s-found").textContent = found;
        document.getElementById("s-pending").textContent = pending;
        document.getElementById("s-miss").textContent = missLog.size;
      }

      // ─── Export ──────────────────────────────────
      function openExport() {
        const foundList = [...orders.entries()]
          .filter(([, v]) => v === "found")
          .map(([k]) => k);
        const pendingList = [...orders.entries()]
          .filter(([, v]) => v === "pending")
          .map(([k]) => k);
        const missList = [...missLog];
        const fill = (boxId, countId, arr, cls) => {
          document.getElementById(countId).textContent = arr.length;
          document.getElementById(boxId).innerHTML = arr.length
            ? arr
                .map((c) => '<span class="' + cls + '">' + esc(c) + "</span>")
                .join("\n")
            : '<span style="color:var(--muted)">（无）</span>';
        };
        fill("exp-found", "exp-found-count", foundList, "hit");
        fill("exp-pending", "exp-pending-count", pendingList, "");
        fill("exp-miss", "exp-miss-count", missList, "nope");
        document.getElementById("modal-bg").classList.add("open");
      }
      function closeExport() {
        document.getElementById("modal-bg").classList.remove("open");
      }
      function closeExportIfBg(e) {
        if (e.target.id === "modal-bg") closeExport();
      }

      function buildReportText() {
        const foundList = [...orders.entries()]
          .filter(([, v]) => v === "found")
          .map(([k]) => k);
        const pendingList = [...orders.entries()]
          .filter(([, v]) => v === "pending")
          .map(([k]) => k);
        const missList = [...missLog];
        return [
          "包裹扫码核验报告  " + new Date().toLocaleString("zh-CN"),
          "",
          "【在列表中已扫到】" + foundList.length + " 个",
          ...foundList,
          "",
          "【列表中未扫到】" + pendingList.length + " 个",
          ...pendingList,
          "",
          "【扫到但不在列表】" + missList.length + " 个",
          ...missList,
        ].join("\n");
      }

      function copyReport() {
        const text = buildReportText();
        const fallback = () => {
          const ta = document.createElement("textarea");
          ta.value = text;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
          toast("已复制");
        };
        navigator.clipboard
          ? navigator.clipboard
              .writeText(text)
              .then(() => toast("已复制到剪贴板"))
              .catch(fallback)
          : fallback();
      }

      function downloadCSV() {
        const foundList = [...orders.entries()]
          .filter(([, v]) => v === "found")
          .map(([k]) => k);
        const pendingList = [...orders.entries()]
          .filter(([, v]) => v === "pending")
          .map(([k]) => k);
        const missList = [...missLog];
        const rows = [
          ["单号", "状态"],
          ...foundList.map((c) => [c, "在列表中已扫到"]),
          ...pendingList.map((c) => [c, "列表中未扫到"]),
          ...missList.map((c) => [c, "扫到但不在列表"]),
        ];
        const csv =
          "\uFEFF" +
          rows
            .map((r) =>
              r.map((c) => '"' + String(c).replace(/"/g, '""') + '"').join(","),
            )
            .join("\n");
        const a = Object.assign(document.createElement("a"), {
          href: URL.createObjectURL(
            new Blob([csv], { type: "text/csv;charset=utf-8;" }),
          ),
          download:
            "包裹核验_" +
            new Date().toLocaleDateString("zh-CN").replace(/\//g, "-") +
            ".csv",
        });
        a.click();
        URL.revokeObjectURL(a.href);
        toast("CSV 已下载");
      }

      // ─── Utils ───────────────────────────────────
      function toast(msg) {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.classList.add("show");
        setTimeout(() => el.classList.remove("show"), 2500);
      }
      function vibrate(p) {
        try {
          navigator.vibrate && navigator.vibrate(p);
        } catch (e) {}
      }
      function esc(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }
      function escRegExp(s) {
        return String(s).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      }

      document
        .getElementById("manual-exact-input")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            checkExactInput();
          }
        });
      document
        .getElementById("manual-search-input")
        .addEventListener("input", (e) => {
          renderManualMatches(e.target.value);
        });
      document
        .getElementById("manual-search-input")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            const first = document.querySelector(
              "#manual-search-results .manual-choice",
            );
            if (first) first.click();
          }
        });

      loadState();
      renderOrderList();
      updateStats();
      updateFsStats();
      setScanMode(scanMode);
    </script>
  </body>
</html>
